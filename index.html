
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RoadSoS</title>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="background-glow"></div>

  <div class="container fade-in">

    <div class="logo-section">

      <h1 class="logo-title">🚨 RoadSoS</h1>

      <p class="tagline">
        Help in seconds, when seconds matter.
      </p>

    </div>

    <div class="card-container">

      <!-- Medical Emergency -->

      <div class="card medical-card">

        <h2>🚑 Medical Emergency</h2>

        <button onclick="goToMedical()">
          Medical Assistance
        </button>

        <div class="card-description">
          <p>
            Find nearby trauma centres,
            ambulance services, and emergency
            medical help quickly.
          </p>
        </div>

      </div>

      <!-- Vehicle Emergency -->

      <div class="card vehicle-card">

        <h2>🚗 Vehicle Emergency</h2>

        <button onclick="goToVehicle()">
          Vehicle Assistance
        </button>

        <div class="card-description">
          <p>
            Get vehicle rescue, towing,
            mechanics, and roadside assistance
            instantly.
          </p>
        </div>

      </div>

    </div>

  </div>

  <script src="js/navigation.js"></script>

</body>
</html>
