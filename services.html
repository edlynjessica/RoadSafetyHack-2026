<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Road SOS Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/dashboard.css">

  <!-- Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="logo">
        🚨 ROAD SOS
      </div>

      <ul>

        <!-- DASHBOARD -->
        <li onclick="goHome()">
          <i class="fa-solid fa-table-columns"></i>
          Dashboard
        </li>

        <!-- SERVICES -->
        <li onclick="window.location.href='services.html'" class="active">
          <i class="fa-solid fa-location-dot"></i>
          Nearby Services
        </li>

        <!-- INCIDENTS -->
        <li onclick="alert('Coming soon')">
          <i class="fa-regular fa-file-lines"></i>
          Active Incidents
        </li>

        <!-- ALERTS -->
        <li onclick="alert('Coming soon')">
          <i class="fa-regular fa-bell"></i>
          My Alerts
        </li>

        <!-- CONTACTS -->
        <li onclick="alert('Coming soon')">
          <i class="fa-solid fa-phone"></i>
          Contacts
        </li>

        <!-- SETTINGS -->
        <li onclick="alert('Coming soon')">
          <i class="fa-solid fa-gear"></i>
          Settings
        </li>

      </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

      <h1>LIVE DASHBOARD PREVIEW</h1>

      <!-- TOP CARDS -->
      <div class="stats-container">

        <div class="stat-card">
          <h3>Active Incidents</h3>
          <p id="incidentsCount">0</p>
        </div>

        <div class="stat-card">
          <h3>Ambulances Nearby</h3>
          <p id="ambulanceCount">0</p>
        </div>

        <div class="stat-card">
          <h3>Trauma Centres</h3>
          <p id="traumaCount">0</p>
        </div>

        <div class="stat-card">
          <h3>Towing Services</h3>
          <p id="towingCount">0</p>
        </div>

      </div>

      <!-- SERVICES -->
      <div class="services-panel">

        <h2>Nearby Services</h2>

        <div id="servicesContainer">
          Loading...
        </div>

      </div>

    </div>

  </div>

  <!-- SCRIPTS (ORDER IMPORTANT) -->
  <script src="js/navigation.js"></script>
  <script src="js/logic.js"></script>
  <script src="js/services.js"></script>

</body>
</html>
